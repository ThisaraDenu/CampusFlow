spring.application.name=campusflow-backend

# Optional secrets (gitignored). Copy local.properties.example -> local.properties in backend/, or use backend/local.properties when running from repo root.
spring.config.import=optional:file:./local.properties,optional:file:./backend/local.properties

# 8081 avoids conflict with Tomcat on 8080. Override: SERVER_PORT=8090 mvnw spring-boot:run
# "Port already in use" usually means another Spring Boot / IntelliJ run is still bound — stop it first.
server.port=${SERVER_PORT:8081}

# Correct scheme/host when behind a reverse proxy (optional; helps OAuth redirect URLs)
server.forward-headers-strategy=framework

spring.datasource.url=jdbc:mysql://localhost:3306/CampusFlow?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# JWT (use a long random secret in production)
app.jwt.secret=CampusFlowDevSecretKey_ChangeInProduction_Min256Bits_CampusFlowDevSecretKey_123456
app.jwt.expiration-ms=86400000

app.frontend.url=${FRONTEND_URL:http://localhost:3000}
# Comma-separated list of allowed origin patterns (exact origins also work).
# Example (LAN dev): http://localhost:3000,http://192.168.*.*:3000
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Local/dev only: bootstrap the first admin account (set via backend/local.properties or env vars).
# app.bootstrap-admin.email=admin@example.com
# app.bootstrap-admin.password=ChangeMe123!
# app.bootstrap-admin.name=Admin

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# Google OAuth2 — use backend/local.properties (see local.properties.example), or env GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:placeholder}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:placeholder}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.provider.google.user-name-attribute=sub
