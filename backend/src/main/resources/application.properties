spring.application.name=campusflow-backend

# 8081 avoids conflict with Tomcat on 8080. Override: SERVER_PORT=8090 mvnw spring-boot:run
# "Port already in use" usually means another Spring Boot / IntelliJ run is still bound — stop it first.
server.port=${SERVER_PORT:8081}

# Correct scheme/host when behind a reverse proxy (optional; helps OAuth redirect URLs)
server.forward-headers-strategy=framework

# MongoDB (set `spring.mongodb.uri` + `spring.mongodb.database` in backend/local.properties)
spring.data.mongodb.auto-index-creation=true
spring.mongodb.uri=mongodb+srv://thissadenugoon_db_user:wgegsDc9TKJ4i6EQ@campusflow.rsgmrmo.mongodb.net/?appName=CampusFlow
spring.mongodb.database=CampusFlow

# JWT (use a long random secret in production)
